{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Energy Login</title>
  <!-- Google Fonts & Font Awesome Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0b2b26 0%, #1a4d3e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      position: relative;
    }

    /* abstract energy wave / grid overlay (no local image) */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?q=80&w=2070&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      opacity: 0.1;
      pointer-events: none;
      z-index: 0;
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      z-index: 2;
      position: relative;
      animation: fadeInUp 0.5s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-card {
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      padding: 2.2rem 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35);
      transition: transform 0.2s ease;
    }

    .login-card:hover {
      transform: translateY(-3px);
    }

    .brand {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .brand i {
      font-size: 3rem;
      background: linear-gradient(120deg, #1e6f3f, #0f4d2f);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .brand h2 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, #1e5a3c, #0f2e24);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .brand p {
      font-size: 0.85rem;
      color: #6c8b7a;
      margin-top: 0.25rem;
    }

    .input-group {
      margin-bottom: 1.2rem;
      position: relative;
    }

    .input-group i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #2c8c5a;
      font-size: 1rem;
      pointer-events: none;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      border: 1.5px solid #e2e8e2;
      border-radius: 1.2rem;
      background: white;
      transition: all 0.2s;
      outline: none;
    }

    .input-group input:focus {
      border-color: #2c8c5a;
      box-shadow: 0 0 0 3px rgba(44, 140, 90, 0.2);
    }

    .btn-login {
      background: linear-gradient(100deg, #1e6f3f, #0f4d2f);
      color: white;
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 1.5rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 0.5rem;
    }

    .btn-login:hover {
      background: linear-gradient(100deg, #155a34, #0a3b22);
      transform: scale(1.02);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
    }

    .error-message {
      background: #ffe6e5;
      border-left: 4px solid #dc3545;
      padding: 12px 16px;
      border-radius: 1rem;
      margin: 1rem 0;
      font-size: 0.85rem;
      font-weight: 500;
      color: #a1220a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .error-message i {
      font-size: 1rem;
      color: #dc3545;
    }

    .register-link {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.85rem;
      color: #5f7b6e;
    }

    .register-link a {
      color: #1e6f3f;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .register-link a:hover {
      color: #0a4a2c;
      text-decoration: underline;
    }

    /* responsive */
    @media (max-width: 500px) {
      .login-card {
        padding: 1.5rem;
      }
      .brand h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="brand">
      <i class="fas fa-charging-station"></i>
      <h2>Smart Energy Hub</h2>
      <p>Sign in to monitor & predict consumption</p>
    </div>

    <form method="POST">
      {% csrf_token %}
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" name="username" placeholder="Username" required autocomplete="username">
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>

    {% if error %}
    <div class="error-message">
      <i class="fas fa-exclamation-triangle"></i>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <div class="register-link">
      <i class="far fa-user-circle"></i> Don't have an account?
      <a href="{% url 'register' %}">Create New Account</a>
    </div>
  </div>
</div>
</body>
</html>
